<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e0e11">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-title" content="ことのは">
<title>ことのは</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Noto+Sans+JP:wght@400;600;700&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  :root {
    --bg: #0e0e11; --bg2: #16161a; --bg3: #1e1e24;
    --card: #16161a; --border: #2e2e38; --border-soft: #252530;
    --accent: #e8a832; --accent2: #e8a83260; --accent-bg: #e8a83214;
    --gold: #e8a832; --gold-light: #f0c060;
    --text: #f0ede8; --muted: #8a8898; --text-muted: #4a4a5a;
    --warm-white: #1e1e24;
  }
  .title-font { font-family: 'Shippori Mincho', 'Noto Serif JP', Georgia, serif; }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%; overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', 'Inter', 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
    font-size: 16px; line-height: 1.7; letter-spacing: 0.02em;
  }
  body { display: flex; flex-direction: column; }
  .screen { display: none; flex: 1; flex-direction: column; min-height: 0; }
  .screen.active { display: flex; }

  /* ========== Dashboard (Center Focus Card) ========== */
  #screen-dashboard {
    padding: 0 20px; overflow-y: auto;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .dash-card {
    background: var(--bg2);
    border-radius: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px var(--border);
    padding: 40px 28px 32px;
    max-width: 420px; width: 100%;
    text-align: center;
    animation: cardFloat 0.6s ease-out;
  }
  @keyframes cardFloat {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .dash-header {
    display: flex; flex-direction: column; align-items: center; text-align: center;
    margin-bottom: 32px;
  }
  .dash-header .logo-icon {
    width: 48px; height: 48px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 16px;
  }
  .dash-header h1 {
    font-size: 1.8em; font-weight: 400; letter-spacing: 0.15em;
    color: var(--text); margin-bottom: 8px;
  }
  .dash-header p { color: var(--muted); font-size: 0.88em; letter-spacing: 0.06em; }

  .new-chat-btn {
    display: block; width: 100%; padding: 18px;
    background: var(--accent); color: var(--bg);
    border: none; border-radius: 14px;
    font-size: 1.05em; font-weight: 600; cursor: pointer;
    font-family: inherit;
    box-shadow: 0 4px 20px rgba(232,168,50,0.3);
    transition: all 0.2s; margin-bottom: 16px;
  }
  .new-chat-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(232,168,50,0.4); }
  .new-chat-btn:active { transform: scale(0.98); }

  /* ========== Chapter Progress (Bookshelf) ========== */
  .chapter-progress {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 18px; margin-bottom: 20px;
  }
  .chapter-progress-title {
    font-size: 0.88em; color: var(--accent2); font-weight: bold;
    margin-bottom: 14px; display: flex; align-items: center; gap: 6px;
  }
  .chapter-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0; border-bottom: 1px solid rgba(224,203,160,0.3);
  }
  .chapter-item:last-child { border-bottom: none; }
  .chapter-color {
    width: 28px; height: 28px; border-radius: 6px;
    flex-shrink: 0; transition: background 0.5s;
  }
  .chapter-name { flex: 1; font-size: 0.85em; color: var(--text); }
  .chapter-score { font-size: 0.78em; font-weight: bold; min-width: 40px; text-align: right; }
  .score-0 { color: #ccc; }
  .score-low { color: var(--muted); }
  .score-mid { color: var(--accent); }
  .score-high { color: var(--accent2); }
  .score-max { color: var(--gold); }

  /* ========== History ========== */
  .history-section-title {
    display: flex; justify-content: space-between; align-items: center;
    margin: 8px 0 12px; color: var(--muted); font-size: 0.82em; letter-spacing: 0.08em; text-transform: uppercase;
  }
  .history-list { display: flex; flex-direction: column; gap: 8px; }
  .history-card-wrapper { position: relative; }
  .history-card {
    display: block; width: 100%;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 48px 14px 16px;
    cursor: pointer; font-family: inherit; text-align: left; color: var(--text);
    transition: all 0.2s;
  }
  .history-card:active { background: var(--bg3); border-color: var(--accent); }
  .history-title { font-weight: 600; color: var(--text); font-size: 0.9em; margin-bottom: 4px; }
  .history-meta { font-size: 0.72em; color: var(--muted); display: flex; justify-content: space-between; gap: 8px; }
  .history-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.65em; font-weight: 600; }
  .badge-active { background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent); }
  .badge-done { background: rgba(61,214,140,0.12); color: #3dd68c; border: 1px solid rgba(61,214,140,0.3); }
  .delete-btn {
    position: absolute; top: 50%; right: 10px; transform: translateY(-50%);
    background: rgba(248,113,113,0.1); color: #f87171; border: 1px solid rgba(248,113,113,0.2);
    border-radius: 50%; width: 32px; height: 32px; cursor: pointer; font-size: 0.85em;
  }

  /* ========== Setup (First time) ========== */
  #screen-setup { padding: 24px 22px; overflow-y: auto; }
  #screen-setup header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
  }
  #screen-setup header .setup-icon {
    width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
    font-size: 2em; background: linear-gradient(135deg, var(--gold), var(--accent2));
    border-radius: 50%; color: #fff;
  }
  #screen-setup header h2 { font-size: 1.1em; color: var(--accent2); }
  #screen-setup header p { color: var(--muted); font-size: 0.82em; }
  .setup-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 20px; margin-bottom: 14px;
  }
  .setup-card h3 { color: var(--accent2); font-size: 0.95em; margin-bottom: 12px; }
  .setup-card input {
    width: 100%; padding: 14px 16px;
    background: var(--warm-white); border: 2px solid var(--border); border-radius: 10px;
    color: var(--text); font-size: 1.05em; font-family: inherit;
  }
  .setup-card input:focus { outline: none; border-color: var(--accent2); }
  .reader-options { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
  .reader-btn {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px; color: var(--text);
    cursor: pointer; text-align: left; font-family: inherit; font-size: 0.92em;
    transition: all 0.2s;
  }
  .reader-btn:active { transform: scale(0.98); border-color: var(--accent); }
  .reader-btn.active {
    background: var(--accent-bg); border-color: var(--accent);
  }
  .reader-btn .reader-label { font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .reader-btn .reader-desc { font-size: 0.78em; color: var(--muted); }

  /* ========== Chat ========== */
  .chat-header {
    padding: 10px 14px;
    background: var(--bg2); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    min-height: 0; flex-wrap: nowrap;
  }
  .chat-header .back-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); padding: 6px 10px; border-radius: 8px;
    font-size: 0.78em; cursor: pointer; font-family: inherit; flex-shrink: 0;
  }
  .chat-header .back-btn:active { border-color: var(--accent); color: var(--accent); }
  .chat-header .chat-icon { display: none; }
  .chat-header .info { flex: 1; min-width: 0; overflow: hidden; }
  .chat-header .info-title { font-size: 0.68em; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chat-header .info-topic {
    font-weight: 600; color: var(--text); font-size: 0.85em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .chat-header .end-btn {
    background: transparent; color: var(--muted); border: 1px solid var(--border);
    padding: 6px 10px; border-radius: 8px; font-size: 0.72em;
    font-weight: 500; cursor: pointer; flex-shrink: 0; font-family: inherit;
    white-space: nowrap;
  }
  .chat-header .end-btn:active { border-color: var(--accent); color: var(--accent); }
  .chat-messages { flex: 1; overflow-y: auto; padding: 24px 16px; -webkit-overflow-scrolling: touch; }
  .msg { margin-bottom: 16px; max-width: 88%; animation: slideIn 0.25s ease-out; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg-ai { margin-right: auto; }
  .msg-user { margin-left: auto; }
  .msg-bubble {
    padding: 14px 18px; border-radius: 12px;
    line-height: 1.7; font-size: 0.95em; word-wrap: break-word;
  }
  .msg-ai .msg-bubble {
    background: var(--bg2); border-left: 2px solid var(--accent);
    color: var(--text);
  }
  .msg-user .msg-bubble {
    background: var(--accent-bg);
    border: 1px solid var(--border);
    color: var(--text);
  }
  .msg-typing { display: flex; gap: 6px; padding: 14px 18px; }
  .msg-typing span {
    width: 7px; height: 7px; background: var(--accent);
    border-radius: 50%; animation: typing 1.4s infinite;
  }
  .msg-typing span:nth-child(2) { animation-delay: 0.2s; }
  .msg-typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing { 0%, 60%, 100% { opacity: 0.2; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-3px); } }

  /* ========== Kanji Confirm Overlay ========== */
  .kanji-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4); z-index: 300;
    align-items: center; justify-content: center; padding: 20px;
  }
  .kanji-overlay.active { display: flex; }
  .kanji-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 24px;
    max-width: 360px; width: 100%; box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  }
  .kanji-card h3 { color: var(--text); font-size: 1em; margin-bottom: 16px; text-align: center; }
  .kanji-options { display: flex; flex-direction: column; gap: 10px; }
  .kanji-btn {
    background: var(--card); border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 18px; cursor: pointer; font-family: inherit; font-size: 0.95em;
    color: var(--text); text-align: left; transition: all 0.15s;
  }
  .kanji-btn:active { transform: scale(0.97); border-color: var(--accent2); }
  .kanji-btn .kanji-label { font-weight: bold; color: var(--accent2); font-size: 1.1em; }
  .kanji-btn .kanji-reading { font-size: 0.78em; color: var(--muted); }

  /* ========== Voice & Input ========== */
  .voice-btn {
    width: 48px; height: 48px; border-radius: 50%;
    background: var(--bg2); border: 1px solid var(--border); color: var(--accent);
    cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3em; transition: all 0.2s; font-family: inherit;
  }
  .voice-btn:active { transform: scale(0.92); }
  .voice-btn.listening {
    background: var(--accent); color: var(--bg); border-color: var(--accent);
    animation: pulseMic 1.2s ease-in-out infinite;
  }
  @keyframes pulseMic {
    0%, 100% { box-shadow: 0 0 0 0 rgba(232,168,50,0.4); }
    50% { box-shadow: 0 0 0 10px rgba(232,168,50,0); }
  }
  .mode-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 12px; background: rgba(248,241,228,0.9);
    border-top: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap;
  }
  .mode-bar .mode-label { font-size: 0.68em; color: var(--muted); white-space: nowrap; min-width: 72px; }
  .mode-group {
    display: inline-flex; background: var(--card);
    border: 1px solid var(--border); border-radius: 14px; overflow: hidden;
  }
  .mode-chip {
    background: transparent; border: none; color: var(--muted);
    padding: 5px 11px; font-size: 0.72em; cursor: pointer;
    font-family: inherit; white-space: nowrap; transition: all 0.15s;
  }
  .mode-chip + .mode-chip { border-left: 1px solid var(--border); }
  .mode-chip.active {
    background: linear-gradient(90deg, rgba(91,61,143,0.15), rgba(201,168,76,0.1));
    color: var(--accent2); font-weight: bold;
  }
  .mode-speed {
    margin-left: auto; background: transparent; border: 1px solid var(--border);
    color: var(--muted); border-radius: 12px; padding: 4px 9px;
    font-size: 0.68em; cursor: pointer; font-family: inherit;
  }
  .mode-speed.on { color: var(--gold); border-color: var(--gold); }
  .chat-input-area {
    padding: 12px 14px; background: var(--bg2); backdrop-filter: blur(10px);
    border-top: 1px solid var(--border); display: flex; gap: 8px;
    align-items: flex-end; flex-shrink: 0;
  }
  .chat-input-area textarea {
    flex: 1; padding: 12px 16px; background: var(--bg3);
    border: 1px solid var(--border); border-radius: 12px; color: var(--text);
    font-size: 0.95em; font-family: inherit; resize: none;
    min-height: 44px; max-height: 120px; line-height: 1.4;
  }
  .chat-input-area textarea:focus { outline: none; border-color: var(--accent); }
  .send-btn {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--accent); color: var(--bg);
    border: none; font-size: 1.2em; cursor: pointer;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .send-btn:active { transform: scale(0.92); }
  .send-btn:disabled { opacity: 0.3; }
  /* マイクは常に表示 */

  /* ========== Progress Bar (in chat) ========== */
  .progress-bar {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 8px 14px; flex-shrink: 0; cursor: pointer;
    transition: background 0.2s; position: relative; overflow: visible;
  }
  .progress-bar:active { background: var(--bg3); }
  .progress-bar.celebrating { animation: celebrate 0.8s ease-out; }
  @keyframes celebrate {
    0%, 100% { background: var(--bg2); }
    50% { background: var(--accent-bg); }
  }
  .progress-header {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.72em; margin-bottom: 4px;
  }
  .progress-header .label { color: var(--accent2); font-weight: bold; }
  .progress-header .value { color: var(--gold); font-weight: bold; }
  .progress-header .label.pulsing { animation: labelPulse 0.8s ease-out; }
  @keyframes labelPulse {
    0% { transform: scale(1); } 30% { transform: scale(1.15); color: var(--gold); } 100% { transform: scale(1); }
  }
  .progress-track { height: 3px; border-radius: 2px; background: var(--border); overflow: hidden; }
  .progress-fill {
    height: 100%; border-radius: 4px;
    background: linear-gradient(90deg, var(--accent2), var(--gold));
    transition: width 0.8s cubic-bezier(0.2, 0.9, 0.3, 1.2); position: relative;
  }
  .progress-fill::after {
    content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
    transform: translateX(-100%);
  }
  .progress-fill.shimmer::after { animation: shimmer 1s ease-out; }
  @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
  .sparkle {
    position: absolute; pointer-events: none; font-size: 1.4em;
    animation: sparkleFloat 1.4s ease-out forwards; z-index: 50;
  }
  @keyframes sparkleFloat {
    0% { opacity: 0; transform: translateY(0) scale(0.5) rotate(0deg); }
    30% { opacity: 1; transform: translateY(-12px) scale(1.2) rotate(180deg); }
    100% { opacity: 0; transform: translateY(-40px) scale(0.8) rotate(360deg); }
  }
  .progress-increase-badge {
    position: absolute; right: 14px; top: -8px;
    background: var(--gold); color: #fff; font-size: 0.7em;
    padding: 3px 10px; border-radius: 12px; font-weight: bold;
    animation: badgePop 1.5s ease-out forwards; pointer-events: none;
    box-shadow: 0 3px 10px rgba(201,168,76,0.5);
  }
  @keyframes badgePop {
    0% { opacity: 0; transform: translateY(10px) scale(0.6); }
    20% { opacity: 1; transform: translateY(0) scale(1.1); }
    40% { transform: translateY(0) scale(1); } 80% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-20px); }
  }
  .progress-detail {
    display: none; margin-top: 10px; grid-template-columns: repeat(2, 1fr);
    gap: 4px 8px; font-size: 0.68em;
  }
  .progress-detail.open { display: grid; }
  .progress-item { display: flex; justify-content: space-between; align-items: center; padding: 2px 0; }
  .progress-item-label { color: var(--muted); }
  .progress-item-score { font-weight: bold; }
  .progress-item-score.zero { color: #bbb; }
  .progress-item-score.low { color: var(--muted); }
  .progress-item-score.mid { color: var(--accent); }
  .progress-item-score.high { color: var(--accent2); }

  /* ========== Session Summary ========== */
  #screen-summary { overflow-y: auto; padding: 24px 22px; }
  #screen-summary .summary-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--border);
  }
  #screen-summary .summary-header .sum-icon {
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6em; background: var(--bg3); color: var(--accent);
  }
  #screen-summary .summary-header h2 { color: var(--text); font-size: 1.05em; }
  #summary-content {
    background: var(--card); padding: 20px; border-radius: 14px;
    border: 1px solid var(--border); font-size: 0.92em; line-height: 1.8;
    color: var(--text); margin-bottom: 14px; white-space: pre-wrap;
  }
  .summary-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }

  /* ========== Buttons ========== */
  .btn {
    width: 100%; padding: 14px;
    background: var(--accent); color: var(--bg);
    border: none; border-radius: 10px;
    font-size: 1em; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .btn:active { transform: scale(0.98); }
  .btn-secondary { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }

  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: var(--bg3); color: var(--accent);
    padding: 10px 20px; border-radius: 10px; font-size: 0.85em;
    z-index: 200; border: 1px solid var(--border);
    opacity: 0; transition: opacity 0.2s; pointer-events: none;
    max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; }
  .loader {
    display: inline-block; width: 24px; height: 24px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
    padding: 40px 22px; text-align: center;
  }
  .loading-card p { margin-top: 14px; color: var(--muted); font-size: 0.88em; }
  .footer-tip {
    text-align: center; color: var(--text-muted); font-size: 0.72em;
    padding: 8px 16px; background: var(--bg2); flex-shrink: 0;
  }

  /* ========== Cards (depth) ========== */
  .card {
    background: var(--bg2); border-radius: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    padding: 20px;
  }

  /* ========== Wave Animation (recording) ========== */
  .wave-bar {
    display: flex; align-items: center; justify-content: center;
    gap: 3px; height: 32px; padding: 0 16px;
    background: var(--bg2); border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .wave-bar.hidden { display: none; }
  .wave-bar span {
    display: block; width: 3px; border-radius: 2px;
    background: var(--accent); animation: wave 1.2s ease-in-out infinite;
  }
  .wave-bar span:nth-child(1) { height: 8px; animation-delay: 0s; }
  .wave-bar span:nth-child(2) { height: 16px; animation-delay: 0.1s; }
  .wave-bar span:nth-child(3) { height: 24px; animation-delay: 0.2s; }
  .wave-bar span:nth-child(4) { height: 16px; animation-delay: 0.3s; }
  .wave-bar span:nth-child(5) { height: 10px; animation-delay: 0.4s; }

// ============================================================

// ============================================================
function loadUserProfile() {
  const profile = JSON.parse(localStorage.getItem("kotonoha_profile") || "null");
  if (profile) {
    state.userName = profile.name;
    state.userReading = profile.reading;
    state.readerType = profile.readerType;
  }
  state.lifeFacts = JSON.parse(localStorage.getItem("kotonoha_facts") || "[]");
  state.sessionSummaries = JSON.parse(localStorage.getItem("kotonoha_summaries") || "[]");
  state.chapterScores = JSON.parse(localStorage.getItem("kotonoha_chapters") || "{}");
  state.sessionCount = parseInt(localStorage.getItem("kotonoha_session_count") || "0", 10);
}

function saveUserProfile() {
  localStorage.setItem("kotonoha_profile", JSON.stringify({
    name: state.userName, reading: state.userReading, readerType: state.readerType
  }));
}

function saveLifeFacts() { localStorage.setItem("kotonoha_facts", JSON.stringify(state.lifeFacts)); }
function saveSessionSummaries() { localStorage.setItem("kotonoha_summaries", JSON.stringify(state.sessionSummaries)); }
function saveChapterScores() { localStorage.setItem("kotonoha_chapters", JSON.stringify(state.chapterScores)); }
function saveSessions() { localStorage.setItem("kotonoha_sessions", JSON.stringify(getSessions())); }

function getSessions() {
  return JSON.parse(localStorage.getItem("kotonoha_sessions") || "[]");
}

// ============================================================

// ============================================================
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  applyI18N();
  if (id === "screen-dashboard") renderDashboard();
  if (id === "screen-chat") {
    updateAllTTSButtons();
  }
}

// ============================================================
// SETUP (first time)
// ============================================================
let selectedReaderType = null;

function selectReader(btn) {
  document.querySelectorAll(".reader-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  selectedReaderType = btn.dataset.reader;
}

function completeSetup() {
  const name = document.getElementById("setup-name").value.trim();
  if (!name) { showToast("お名前を入力してください"); return; }
  if (!selectedReaderType) { showToast("読者を選んでください"); return; }
  state.userName = name;
  state.readerType = selectedReaderType;
  saveUserProfile();
  showScreen("screen-dashboard");
  showToast(`${name}さん、よろしくお願いします`);
}

  // 履歴がある場合のみ名前を表示
  const sessions = getSessions();
  const hasHistory = sessions.length > 0;
  document.getElementById("greeting-text").textContent =
    (hasHistory && state.userName) ? `${state.userName}さんの自叙伝` : i18n("tagline");
  renderChapterProgress();
  renderSessionHistory();
}

function renderChapterProgress() {
  const list = document.getElementById("chapter-list");
  list.innerHTML = CATEGORIES.map(cat => {
    const score = state.chapterScores[cat.key] || 0;
    const color = scoreToColor(score);
    const cls = score === 0 ? "score-0" : score < 30 ? "score-low" : score < 60 ? "score-mid" : score < 90 ? "score-high" : "score-max";
    return `<div class="chapter-item">
      <div class="chapter-color" style="background:${color};"></div>
      <span class="chapter-name">${i18n(cat.labelKey)}</span>
      <span class="chapter-score ${cls}">${score > 0 ? getScoreLabel(score) : i18n("score_none")}</span>
    </div>`;
  }).join("");
}

function scoreToColor(score) {
  if (score === 0) return "#e8e0d0";
  if (score < 30) return "#d4c4a0";
  if (score < 60) return "#b8976a";
  if (score < 90) return "#8b6914";
  return "linear-gradient(135deg, #c9a84c, #5b3d8f)";
}

function getScoreLabel(score) {
  if (score < 30) return i18n("score_low");
  if (score < 60) return i18n("score_mid");
  if (score < 90) return i18n("score_high");
  return i18n("score_max");
}

// Onboarding state machine
let onboardingStep = null; // null = not onboarding, "ask_name" | "ask_reader" | "done"

function startNewSession() {
  // 新規セッション：完全にクリーンな状態で開始
  state.userName = null;
  state.userReading = null;
  state.readerType = null;
  state.conversation = [];
  state.lifeFacts = [];
  state.chapterScores = {};
  state.sessionId = "local_" + Date.now();
  // セッション番号は履歴の数+1（インクリメントではなく計算）
  const sessions = getSessions();
  state.sessionCount = sessions.length + 1;
  localStorage.setItem("kotonoha_session_count", String(state.sessionCount));

  showScreen("screen-chat");
  document.getElementById("messages").innerHTML = "";
  document.getElementById("chat-topic").textContent = `${i18n("session_label")}${state.sessionCount}${i18n("session_unit")}`;
  resetProgressMeter();

  // 最初のメッセージも統一ルール（考え中→音声準備→表示+再生）
  onboardingStep = "ask_name";
  sayAI(i18n("onboard_greeting"));
}

// Handle onboarding responses (intercept before normal AI call)
function handleOnboarding(userText) {
  if (onboardingStep === "ask_name") {
    let name = userText.trim()
      .replace(/です[。．.]?$/g, "")
      .replace(/と申します[。．.]?$/g, "")
      .replace(/と言います[。．.]?$/g, "")
      .replace(/^私は/g, "")
      .replace(/^名前は/g, "")
      .trim();
    if (!name || name.length > 20) {
      sayAI(i18n("onboard_name_retry"));
      return true;
    }
    state.userName = name;
    onboardingStep = "ask_reading";
    sayAI(`「${name}」さんですね。\n\n読み方を教えていただけますか？\nたとえば「やまだ たろう」のように、ひらがなでお願いします。`);
    return true;
  }
  if (onboardingStep === "ask_reading") {
    let reading = userText.trim()
      .replace(/です[。．.]?$/g, "")
      .replace(/^読みは/g, "")
      .replace(/^よみは/g, "")
      .trim();
    if (!reading) {
      sayAI("すみません、読み方をもう一度教えていただけますか？ひらがなでお願いします。");
      return true;
    }
    state.userReading = reading;
    saveUserProfile();
    onboardingStep = "ask_reader";
    sayAI(`${state.userName}（${reading}）さん、よろしくお願いします。\n\nこの本は、誰に向けて残したいですか？\nたとえば「家族に」「仕事の仲間に」「自分の記録として」——\nなんとなくでも大丈夫です。`);
    return true;
  }
  if (onboardingStep === "ask_reader") {
    const text = userText.toLowerCase();
    let readerType = "undecided";
    if (/家族|息子|娘|孫|子供|妻|夫|嫁/.test(text)) readerType = "grandchildren";
    else if (/会社|社員|後輩|仕事|同僚|部下|後継/.test(text)) readerType = "business";
    else if (/自分|記録|振り返|棚卸/.test(text)) readerType = "self";

    state.readerType = readerType;
    saveUserProfile();
    onboardingStep = null;

    document.getElementById("chat-topic").textContent = `${i18n("session_label")}1${i18n("session_unit")}`;

    const readerLabel = readerType === "grandchildren" ? i18n("reader_family") :
                        readerType === "business" ? i18n("reader_business") :
                        readerType === "self" ? i18n("reader_self") : "";
    const readerAck = readerLabel ? `${readerLabel}${i18n("reader_ack")}` : "";

    sayAI(`${readerAck}${i18n("onboard_goal").replace("{name}", state.userName)}`);
    return true;
  }
  return false;
}

function getPhase() {
  if (state.sessionCount <= 3) return 1;
  if (state.sessionCount <= 5) return 2;
  return 3;
}

function getWeakestChapter() {
  let min = Infinity, weakest = CATEGORIES[0];
  for (const cat of CATEGORIES) {
    const score = (state.chapterScores[cat.key] || 0) * cat.weight;
    if (score < min) { min = score; weakest = cat; }
  }
  return weakest;
}

function buildSystemPrompt() {
  const msgCount = state.conversation.filter(m => m.role === "user").length;

  const langName = LANGS[currentLang]?.name || "Japanese";
  return `You are "Kotonoha", a warm and empathetic AI journalist specialized in autobiography creation. Always respond in ${langName} only.

CONVERSATION RULES:
1. Ask only ONE question at a time. Never combine multiple questions.
2. Naturally express empathy, surprise, and curiosity.
3. Match the user's pace. Never rush them.
4. When a proper noun (person name, place, company) appears, gently ask for the kanji and reading.
5. For emotional statements, show empathy first, then ask a follow-up question.
6. Actively ask about sensory details ("What did it smell like at that time?").

IMPORTANT CONTEXT RULES:
- You only know what was said in THIS conversation (the messages you can see).
- Do NOT assume you know anything about the user that wasn't said in this conversation.
- If the user hasn't introduced themselves yet, do NOT use their name.
- Do NOT claim progress has been made unless the user actually discussed topics in this conversation.
- Never say "大まかな流れが見えてきました" unless the user actually outlined their book in this conversation.

YOUR ROLE IN THIS SESSION:
${msgCount < 3 ? "You are just getting started. Help the user define what kind of book they want to create. Ask about their vision — themes, tone, audience. Be collaborative. Do NOT jump into asking about childhood or specific life events yet." : "Continue the natural flow of conversation. Follow up on what the user has been telling you. Stay curious and warm."}

USER INFO:
Name: ${state.userName || "(not yet provided)"}
Reading: ${state.userReading || "(not yet provided)"}
Intended readers: ${state.readerType || "(not yet decided)"}

FORBIDDEN:
- Never fabricate facts or assume knowledge not in this conversation
- Never say percentages aloud
- No rapid-fire interrogation-style questions
- No rushing expressions
- Never reference "past sessions" or "previous conversations" unless the user brings it up`;
}

function hideTyping() { const t = document.getElementById("typing-indicator"); if (t) t.remove(); }

// ============================================================
// AI発言の統一ルール（例外なし）
// 1. 「考えています…」8秒
// 2. 「音声を準備中…」TTS完了まで（消音時はスキップ）
// 3. テキスト表示 + 音声再生を同時に
// ============================================================
async function sayAI(text) {
  const sid = state.sessionId;
  const thinkStart = Date.now();

  // Step 1: 考えています…（8秒）
  showTyping(i18n("thinking"));
  await thinkingDelay(thinkStart);
  if (state.sessionId !== sid) { hideTyping(); return; }

  // Step 2: 音声準備（消音時はスキップ）
  if (isTTSEnabled()) {
    updateTypingLabel(i18n("preparing_voice"));
    try {
      const ttsData = await fetchTTSData(text);
      if (state.sessionId !== sid) { hideTyping(); return; }
      // Step 3: テキスト表示 + 音声再生を同時に
      hideTyping();
      addMessage("ai", text);
      if (ttsData) {
        // iOS: audio要素の再生は事前unlockに依存しない方式
        playTTSData(ttsData, text);
      }
    } catch(e) {
      hideTyping();
      addMessage("ai", text);
    }
  } else {
    hideTyping();
    addMessage("ai", text);
  }
}

const MIN_THINKING_MS = 8000;
function thinkingDelay(startTime) {
  const elapsed = Date.now() - startTime;
  const remaining = MIN_THINKING_MS - elapsed;
  return remaining > 0 ? new Promise(r => setTimeout(r, remaining)) : Promise.resolve();
}

document.getElementById("start-new-btn").addEventListener("click", () => {

});
document.getElementById("chat-input").addEventListener("input", autoGrow);
function autoGrow() {
  const ta = document.getElementById("chat-input");
  ta.style.height = "auto";
  ta.style.height = Math.min(120, ta.scrollHeight) + "px";
}
function isMobile() { return /iPhone|iPad|Android/i.test(navigator.userAgent); }

async function sendMessage() {
  // Audio unlock は送信をブロックしない（失敗しても続行）
  unlockAudioOnce().catch(() => {});

  const input = document.getElementById("chat-input");
  const text = input.value.trim();
  if (!text) return;
  // 生成中でも送信ボタン自体は押せるが、二重送信を防ぐ
  if (state.isGenerating) {
    showToast(i18n("waiting"));
    return;
  }
  if (isListening) {
    try { recognition && recognition.stop(); } catch(e){}
    stopVoiceInput();
  }
  input.value = "";
  input.style.height = "auto";
  input.blur();
  addMessage("user", text);

  // オンボーディング中はAI呼び出しせずローカル処理
  if (onboardingStep) {
    if (handleOnboarding(text)) return;
  }

  state.isGenerating = true;
  document.getElementById("send-btn").disabled = true;
  try {
    // API呼び出し中は「考えています…」を表示
    showTyping(i18n("thinking"));
    const reply = await callKotonohaChat();
    hideTyping();
    // 統一ルール：考え中8秒→音声準備→テキスト+音声同時
    await sayAI(reply);
    autoSaveCurrentSession();
    localAnalyzeProgress();
  } catch (e) {
    hideTyping();
    console.error("sendMessage error:", e);
    addMessage("ai", i18n("error_retry"));
  } finally {
    state.isGenerating = false;
    document.getElementById("send-btn").disabled = false;
  }
}

async function callKotonohaChat() {
  const systemPrompt = buildSystemPrompt();

  const contents = state.conversation.map(m => ({
    role: m.role === "ai" ? "model" : "user",
    parts: [{ text: m.content }]
  }));

  const res = await fetch(KOTONOHA_API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      systemInstruction: { parts: [{ text: systemPrompt }] },
      contents: contents,
      generationConfig: {
        temperature: 0.85,
        maxOutputTokens: 2048,
        topP: 0.95,
      }
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || "API error");
  const reply = data.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!reply) throw new Error("empty response");
  return reply.trim();
}

// ============================================================
function localAnalyzeProgress() {
  const allText = state.conversation
    .filter(m => m.role === "user")
    .map(m => m.content).join(" ");

  const keywords = {
    childhood: ["子供の頃", "幼少", "小さい頃", "生まれ", "育った", "父", "母", "兄弟", "姉妹", "家族"],
    school: ["学校", "学生", "部活", "友達", "先生", "高校", "大学", "中学", "小学"],
    career_start: ["就職", "入社", "仕事", "会社", "キャリア", "最初の"],
    turning_point: ["転機", "決断", "変わった", "人生が変わった", "大きな"],
    love_partner: ["結婚", "妻", "夫", "彼女", "彼氏", "出会い", "恋"],
    family_children: ["子供", "息子", "娘", "子育て", "孫", "家庭"],
    greatest_success: ["成功", "やり遂げた", "誇り", "うまくいった", "一番の"],
    greatest_failure: ["失敗", "後悔", "つらかった", "倒産", "挫折"],
    travel: ["旅行", "旅", "海外", "移住", "引っ越し"],
    work_philosophy: ["信念", "哲学", "こだわり", "大切にし", "モットー"],
    gratitude: ["感謝", "おかげ", "ありがとう", "お世話になった"],
    message_next_gen: ["伝えたい", "メッセージ", "若い人", "次の世代"],
    future_dreams: ["夢", "これから", "やりたい", "目標", "将来"],
    life_in_a_word: ["一言で", "人生とは", "座右の銘"],
  };

  const newScores = { ...state.chapterScores };
  for (const [key, words] of Object.entries(keywords)) {
    let hits = 0;
    for (const w of words) {
      if (allText.includes(w)) hits++;
    }
    const score = Math.min(100, (newScores[key] || 0) + hits * 15);
    newScores[key] = score;
  }
  state.chapterScores = newScores;
  saveChapterScores();
  renderProgressMeter();
}

// ============================================================
// PROGRESS METER (in-chat)
// ============================================================
function resetProgressMeter() {
  state.lastProgress = 0;
  document.getElementById("progress-fill").style.width = "0%";
  document.getElementById("progress-label").textContent = "本の色づき: 0%";
  document.getElementById("progress-msg-count").textContent = "0 発言";
  document.getElementById("progress-detail").innerHTML = "";
  document.getElementById("progress-detail").classList.remove("open");
}

function renderProgressMeter() {
  let totalWeighted = 0, totalWeight = 0;
  for (const cat of CATEGORIES) {
    totalWeighted += (state.chapterScores[cat.key] || 0) * cat.weight;
    totalWeight += 100 * cat.weight;
  }
  const progress = Math.round(totalWeighted / totalWeight * 100);
  const prev = state.lastProgress || 0;
  const delta = progress - prev;

  const fill = document.getElementById("progress-fill");
  const label = document.getElementById("progress-label");
  const bar = document.getElementById("progress-bar");

  label.textContent = `本の色づき: ${progress}%`;
  fill.style.width = progress + "%";
  const userMsgs = state.conversation.filter(m => m.role === "user").length;
  document.getElementById("progress-msg-count").textContent = `${userMsgs} 発言`;

  if (delta >= 1) {
    fill.classList.remove("shimmer"); void fill.offsetWidth; fill.classList.add("shimmer");
    bar.classList.remove("celebrating"); void bar.offsetWidth; bar.classList.add("celebrating");
    label.classList.remove("pulsing"); void label.offsetWidth; label.classList.add("pulsing");
    spawnSparkles(bar, delta);
    showDeltaBadge(bar, delta);
  }
  state.lastProgress = progress;

  const detail = document.getElementById("progress-detail");
  detail.innerHTML = CATEGORIES.map(cat => {
    const score = state.chapterScores[cat.key] || 0;
    const cls = score === 0 ? "zero" : score < 30 ? "low" : score < 60 ? "mid" : "high";
    return `<div class="progress-item">
      <span class="progress-item-label">${cat.label}</span>
      <span class="progress-item-score ${cls}">${score > 0 ? getScoreLabel(score) : "---"}</span>
    </div>`;
  }).join("");
}

function spawnSparkles(container, intensity) {
  const count = Math.min(6, Math.max(3, Math.floor(intensity / 3)));
  const sparkleChars = ["&#x2728;", "&#x1F338;", "&#x2B50;", "&#x1F4AB;", "&#x1F4D6;"];
  const rect = container.getBoundingClientRect();
  for (let i = 0; i < count; i++) {
    const sparkle = document.createElement("div");
    sparkle.className = "sparkle";
    sparkle.innerHTML = sparkleChars[Math.floor(Math.random() * sparkleChars.length)];
    sparkle.style.left = (20 + Math.random() * (rect.width - 40)) + "px";
    sparkle.style.bottom = (8 + Math.random() * 10) + "px";
    sparkle.style.animationDelay = (i * 0.08) + "s";
    container.appendChild(sparkle);
    setTimeout(() => sparkle.remove(), 1500 + i * 80);
  }
}

function showDeltaBadge(container, delta) {
  const badge = document.createElement("div");
  badge.className = "progress-increase-badge";
  badge.textContent = `+${delta}%`;
  container.appendChild(badge);
  setTimeout(() => badge.remove(), 1600);
}

function toggleProgressDetail() {
  document.getElementById("progress-detail").classList.toggle("open");
}

// SESSION MANAGEMENT (local)
// ============================================================
function autoSaveCurrentSession() {
  const sessions = getSessions();
  const existing = sessions.findIndex(s => s.id === state.sessionId);
  const data = {
    id: state.sessionId,
    sessionNum: state.sessionCount,
    date: new Date().toISOString(),
    conversation: state.conversation,
    messageCount: state.conversation.filter(m => m.role === "user").length,
    completed: false,
  };
  if (existing >= 0) sessions[existing] = data;
  else sessions.push(data);
  localStorage.setItem("kotonoha_sessions", JSON.stringify(sessions));
}

function resumeSession(idx) {
  const sessions = getSessions();
  const s = sessions[idx];
  if (!s) return;
  state.sessionId = s.id;
  state.sessionCount = s.sessionNum;
  // このセッションの会話だけをロード（他の履歴は含めない）
  state.conversation = [...(s.conversation || [])];
  showScreen("screen-chat");
  document.getElementById("messages").innerHTML = "";
  document.getElementById("chat-topic").textContent = `第${s.sessionNum}回（続き）`;
  resetProgressMeter();
  // 画面に会話を表示（stateには既にpushされているのでaddMessageではなく直接描画）
  for (const msg of state.conversation) {
    const messages = document.getElementById("messages");
    const msgDiv = document.createElement("div");
    msgDiv.className = `msg msg-${msg.role === "ai" ? "ai" : "user"}`;
    msgDiv.innerHTML = `<div class="msg-bubble">${escapeHtml(msg.content)}</div>`;
    messages.appendChild(msgDiv);
  }
  document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
  localAnalyzeProgress();
  showToast(`第${s.sessionNum}回の会話を復元しました`);
}

function endSessionConfirm() {
  // 音声を即停止

    showScreen("screen-dashboard");

  }
}

document.getElementById("end-btn").onclick = () => {

};

async function endSession() {
  // Mark session as completed
  const sessions = getSessions();
  const existing = sessions.findIndex(s => s.id === state.sessionId);
  if (existing >= 0) {
    sessions[existing].completed = true;
    sessions[existing].conversation = state.conversation;
    sessions[existing].messageCount = state.conversation.filter(m => m.role === "user").length;
    localStorage.setItem("kotonoha_sessions", JSON.stringify(sessions));
  }

  // Generate summary
  showScreen("screen-summary");
  document.getElementById("summary-loading").style.display = "block";
  document.getElementById("summary-result").style.display = "none";

  try {
    const summary = await generateSessionSummary();
    state.sessionSummaries.push({
      sessionNum: state.sessionCount,
      summary: summary,
      date: new Date().toISOString(),
      topics: extractTopics(state.conversation),
    });
    saveSessionSummaries();
    document.getElementById("summary-content").textContent = summary;
    document.getElementById("summary-loading").style.display = "none";
    document.getElementById("summary-result").style.display = "block";
  } catch (e) {
    document.getElementById("summary-content").textContent = "今日もたくさんお話を聞かせていただきました。ありがとうございました。";
    document.getElementById("summary-loading").style.display = "none";
    document.getElementById("summary-result").style.display = "block";
  }
}

async function generateSessionSummary() {
  const convText = state.conversation.map(m =>
    `${m.role === "ai" ? "ことのは" : state.userName}: ${m.content}`
  ).join("\n");

  const summaryPrompt = `以下の会話を200字以内で要約してください。話された主要なエピソードと出てきた感情を含めてください。\n\n${convText}`;

  const res = await fetch(KOTONOHA_API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      systemInstruction: { parts: [{ text: "You are a Japanese assistant that creates warm and empathetic conversation summaries. Always respond in Japanese only. Summarize in 200 characters or less." }] },
      contents: [{ role: "user", parts: [{ text: summaryPrompt }] }],
      generationConfig: { maxOutputTokens: 400 }
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || "Gemini API error");
  const reply = data.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!reply) throw new Error("empty response");
  return reply.trim();
}

function extractTopics(conversation) {
  const text = conversation.filter(m => m.role === "user").map(m => m.content).join(" ");
  const topics = [];
  const topicKeywords = {
    "幼少期": ["子供の頃", "小さい頃", "生まれ"],
    "家族": ["父", "母", "兄弟", "姉妹", "家族"],
    "学校": ["学校", "学生", "部活"],
    "仕事": ["仕事", "会社", "就職"],
    "結婚": ["結婚", "妻", "夫"],
  };
  for (const [topic, words] of Object.entries(topicKeywords)) {
    if (words.some(w => text.includes(w))) topics.push(topic);
  }
  return topics.length ? topics : ["日常の話"];
}

// ============================================================
// VOICE (Web Speech API) — from Risa's Studio
// ============================================================
let recognition = null;
let isListening = false;
let silenceTimer = null;
let finalTranscript = "";
const SILENCE_TIMEOUT_MS = 10000;

function initSpeechRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const rec = new SR();
  rec.lang = LANGS[currentLang]?.speech || "ja-JP";
  rec.continuous = true;
  rec.interimResults = true;
  rec.maxAlternatives = 1;
  return rec;
}

function resetSilenceTimer() {
  if (silenceTimer) clearTimeout(silenceTimer);
  silenceTimer = setTimeout(() => {
    showToast("10秒間発言なし - マイク停止");
    try { recognition && recognition.stop(); } catch (e) {}
  }, SILENCE_TIMEOUT_MS);
}

function startVoiceInput() {
  stopCurrentAudio(); currentAudio = null;
  if (window.speechSynthesis) { try { window.speechSynthesis.cancel(); } catch(e){} }
  if (recognition) { try { recognition.abort(); } catch(e){} recognition = null; }
  if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }
  recognition = initSpeechRecognition();
  if (!recognition) { showToast("お使いのブラウザは音声入力に対応していません"); return; }
  const btn = document.getElementById("voice-btn");
  const input = document.getElementById("chat-input");
  finalTranscript = input.value || "";
  recognition.onstart = () => {
    isListening = true; btn.classList.add("listening");
    btn.innerHTML = '<i data-lucide="mic-off" style="width:22px;height:22px;"></i>';
    if (typeof lucide !== 'undefined') lucide.createIcons();
    document.getElementById("wave-bar").classList.remove("hidden");
    showToast("話してください (10秒静かで自動停止)");
    resetSilenceTimer();
  };
  recognition.onresult = (e) => {
    let interim = "";
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const transcript = e.results[i][0].transcript;
      if (e.results[i].isFinal) finalTranscript += transcript;
      else interim += transcript;
    }
    input.value = finalTranscript + interim;
    input.style.height = "auto";
    input.style.height = Math.min(120, input.scrollHeight) + "px";
    resetSilenceTimer();
  };
  recognition.onerror = (e) => {
    if (e.error === "no-speech") return;
    if (e.error === "not-allowed") showToast("マイクの使用が許可されていません");
    else if (e.error !== "aborted") showToast("音声エラー: " + e.error);
    stopVoiceInput();
  };
  recognition.onend = () => {
    stopVoiceInput();
    // 音声認識完了 → テキストがあれば自動送信
    const finalText = document.getElementById("chat-input").value.trim();
    if (finalText) {
      sendMessage();
    }
  };
  try { recognition.start(); } catch (e) { stopVoiceInput(); }
}

function stopVoiceInput() {
  isListening = false;
  if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }
  const btn = document.getElementById("voice-btn");
  btn.classList.remove("listening");
  btn.innerHTML = '<i data-lucide="mic" style="width:22px;height:22px;"></i>';
  if (typeof lucide !== 'undefined') lucide.createIcons();
  document.getElementById("wave-bar").classList.add("hidden");
  if (recognition) {
    try { recognition.onresult = null; recognition.onerror = null; recognition.onend = null; } catch(e){}
    recognition = null;
  }
}

document.getElementById("voice-btn").onclick = async () => {
  await unlockAudioOnce();
  if (isListening) {
    // マイク停止 → onendで自動送信される
    try { recognition && recognition.stop(); } catch (e) {}
  } else {
    startVoiceInput();
  }
};

// TTS Controls — 消音 / 倍速

const TTS_SPEEDS = [1.0, 1.25, 1.5, 2.0];
let ttsSpeedIndex = parseInt(localStorage.getItem("kotonoha_tts_speed") || "0", 10);
let ttsMuted = localStorage.getItem("kotonoha_tts_muted") === "true";

function updateAllTTSButtons() {
  const iconName = ttsMuted ? "volume-x" : "volume-2";
  const speed = TTS_SPEEDS[ttsSpeedIndex] + "x";
  // ダッシュボード
  const dashToggle = document.getElementById("dash-tts-toggle");
  const dashSpeed = document.getElementById("dash-tts-speed");
  if (dashToggle) { dashToggle.innerHTML = `<i data-lucide="${iconName}" style="width:22px;height:22px;"></i>`; }
  if (dashSpeed) { dashSpeed.textContent = speed; dashSpeed.style.display = ttsMuted ? "none" : ""; }
  // チャット
  const chatToggle = document.getElementById("chat-tts-toggle");
  const chatSpeed = document.getElementById("chat-tts-speed");

  if (chatSpeed) { chatSpeed.textContent = speed; chatSpeed.style.display = ttsMuted ? "none" : ""; }
  // Lucideアイコン再描画
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

function toggleTTSMute() {
  ttsMuted = !ttsMuted;
  localStorage.setItem("kotonoha_tts_muted", String(ttsMuted));
  updateAllTTSButtons();
  if (ttsMuted) { stopCurrentAudio(); }
  showToast(ttsMuted ? "🔇 消音" : "🔊 音声ON");
}

function cycleTTSSpeed() {
  ttsSpeedIndex = (ttsSpeedIndex + 1) % TTS_SPEEDS.length;
  localStorage.setItem("kotonoha_tts_speed", String(ttsSpeedIndex));
  updateAllTTSButtons();
  showToast(TTS_SPEEDS[ttsSpeedIndex] + "x");
  if (ttsAudioEl && !ttsAudioEl.paused) {
    try { ttsAudioEl.playbackRate = TTS_SPEEDS[ttsSpeedIndex]; } catch(e) {}
  }
}

function getTTSSpeed() { return TTS_SPEEDS[ttsSpeedIndex]; }
function isTTSEnabled() { return !ttsMuted; }
updateAllTTSButtons();

// ============================================================
// AUDIO (iOS-safe pattern from Risa's Studio)
// ============================================================
const IS_IOS = /iPhone|iPad|iPod/i.test(navigator.userAgent) ||
  (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
const SILENT_WAV = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAIlYAAESsAAACABAAZGF0YQAAAAA=";
let ttsAudioEl = null;
let ttsAudioUnlocked = false;
let currentAudio = null;

function ensureTTSAudioEl() {
  if (!ttsAudioEl) { ttsAudioEl = new Audio(); ttsAudioEl.preload = "auto"; ttsAudioEl.playsInline = true; }
  return ttsAudioEl;
}

async function unlockAudioOnce() {
  if (ttsAudioUnlocked) return true;
  const el = ensureTTSAudioEl();
  el.src = SILENT_WAV; el.volume = 0;
  try {
    await el.play();
    try { el.pause(); } catch(e) {}
    try { el.currentTime = 0; } catch(e) {}
    el.volume = 1; ttsAudioUnlocked = true; return true;
  } catch (e) { return false; }
}

function base64ToBlobUrl(base64, mime) {
  const bin = atob(base64); const len = bin.length;
  const u8 = new Uint8Array(len);
  for (let i = 0; i < len; i++) u8[i] = bin.charCodeAt(i);
  return URL.createObjectURL(new Blob([u8], { type: mime }));
}

async function playAudioBase64(base64, mime) {
  const el = ensureTTSAudioEl();
  if (el._blobUrl) { try { URL.revokeObjectURL(el._blobUrl); } catch(e) {} el._blobUrl = null; }
  const blobUrl = base64ToBlobUrl(base64, mime);
  el._blobUrl = blobUrl; el.src = blobUrl; el.volume = 1;
  try { el.currentTime = 0; } catch(e) {}
  return el.play();
}

function stopCurrentAudio() {
  if (!ttsAudioEl) return;
  try { ttsAudioEl.pause(); } catch(e) {}
  if (ttsAudioEl._blobUrl) { try { URL.revokeObjectURL(ttsAudioEl._blobUrl); } catch(e) {} ttsAudioEl._blobUrl = null; }
}

async function fetchTTSData(text) {
  stopCurrentAudio(); currentAudio = null;
  if (window.speechSynthesis) { try { window.speechSynthesis.cancel(); } catch(e){} }
  try {
    // AI記者と同じ gemini-3.1-flash-tts-preview / Hanako を使用
    const res = await fetch(`${API_BASE}/api/tts`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text: text, rate: getTTSSpeed(), persona: "hanako" })
    });
    const data = await res.json();
    if (data.error || !data.audio) return null;
    return { data, text };
  } catch (e) { return null; }
}

function playTTSData(ttsResult, fallbackText) {
  if (!ttsResult || !ttsResult.data) {
    speakBrowserFallback(fallbackText); return;
  }
  const data = ttsResult.data;
  const mime = data.mime || "audio/wav";
  const el = ensureTTSAudioEl();
  const onEnded = () => { el.removeEventListener("ended", onEnded); el.removeEventListener("error", onError); currentAudio = null; };
  const onError = () => { el.removeEventListener("ended", onEnded); el.removeEventListener("error", onError); currentAudio = null; };
  el.addEventListener("ended", onEnded);
  el.addEventListener("error", onError);
  playAudioBase64(data.audio, mime).then(() => {
    currentAudio = el;
    try { el.playbackRate = getTTSSpeed(); } catch(e) {}
  }).catch(() => {
    el.removeEventListener("ended", onEnded);
    el.removeEventListener("error", onError);
    currentAudio = null;
    speakBrowserFallback(fallbackText);
  });
}

function speakBrowserFallback(text) {
  if (!window.speechSynthesis) return;
  const clean = text.replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/gu, "").replace(/\n+/g, "。").slice(0, 500);
  try {
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(clean);
    utter.lang = LANGS[currentLang]?.speech || "ja-JP"; utter.rate = getTTSSpeed(); utter.volume = 1.0;
    window.speechSynthesis.speak(utter);
  } catch (e) {}
}
